<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Master - All In One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col items-center justify-center p-4">

    <!-- KHUNG ỨNG DỤNG CHÍNH -->
    <div class="w-full max-w-md bg-gray-800 h-[90vh] flex flex-col shadow-2xl relative overflow-hidden rounded-xl border border-gray-700">

        <!-- ==================== SCREEN 0: MENU LỰA CHỌN ==================== -->
        <div id="menu-screen" class="absolute inset-0 bg-gray-900 z-50 flex flex-col items-center justify-center p-6 transition-all duration-500">
            <h1 class="text-3xl font-bold text-white mb-2">English Master</h1>
            <p class="text-gray-400 text-sm mb-10 text-center">Chọn chế độ luyện tập của bạn</p>

            <button onclick="selectMode('guided')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl mb-4 transition duration-200 flex flex-col items-center">
                <span class="text-lg">🎯 Guided Practice</span>
                <span class="text-xs font-normal text-blue-200 mt-1">Luyện theo kịch bản & Chấm phát âm</span>
            </button>

            <button onclick="selectMode('free')" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-4 rounded-xl transition duration-200 flex flex-col items-center">
                <span class="text-lg">🗣️ Free Chat</span>
                <span class="text-xs font-normal text-purple-200 mt-1">Trò chuyện tự do & Sửa ngữ pháp</span>
            </button>
        </div>

        <!-- ==================== MODULE 1: GUIDED MODE (KỊCH BẢN) ==================== -->
        <div id="guided-container" class="hidden h-full flex-col absolute inset-0 z-40 bg-gray-800">
            <!-- Setup Topic -->
            <div id="start-screen" class="absolute inset-0 bg-gray-900 z-10 flex flex-col items-center justify-center p-6 transition-all duration-500">
                <button onclick="backToMenu()" class="absolute top-4 left-4 flex items-center gap-2 px-3 py-2 text-gray-400 hover:text-white hover:bg-gray-800 rounded-lg transition-all duration-200 group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                    <span class="text-sm font-medium">Quay lại</span>
                </button>
                <h1 class="text-3xl font-bold text-blue-400 mb-2">Practice Mode</h1>
                <p class="text-gray-400 text-sm mb-8 text-center">Nhập chủ đề bạn muốn luyện tập</p>
                <input type="text" id="topic-input" placeholder="VD: At a coffee shop..." class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-4">
                <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">START CONVERSATION</button>
            </div>

            <!-- Chat UI -->
            <div id="chat-header" class="bg-gray-900 p-4 border-b border-gray-700 flex justify-between items-center hidden">
                <button onclick="backToMenu()" class="p-2 -ml-2 text-gray-400 hover:text-white hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center" title="Quay lại">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <h2 id="current-topic-display" class="font-bold text-lg text-white truncate flex-1">Topic...</h2>
            </div>

            <div id="chat-history" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 hidden"></div>

            <div id="interaction-panel" class="bg-gray-900 p-4 border-t border-gray-700 hidden flex-col gap-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-yellow-500 uppercase tracking-wider">Your Turn to Read:</span>
                </div>
                <div class="bg-gray-800 p-3 rounded-lg border border-gray-600">
                    <p id="target-text" class="text-lg font-semibold text-white">Loading...</p>
                    <p id="target-phonetics" class="text-sm text-gray-400 mt-1 italic">...</p>
                </div>
                <div id="feedback-result" class="hidden bg-gray-800 p-3 rounded-lg border border-red-500 text-lg"></div>
                <p id="status-msg" class="text-xs text-center text-gray-400">Nhấn nút Micro để đọc câu trên</p>

                <div class="relative flex items-center justify-center mt-2 h-16">
                    <button id="record-btn" disabled class="bg-gray-700 disabled:opacity-50 text-white p-4 rounded-full shadow-lg flex items-center justify-center transition-all w-16 h-16 z-10">🎤</button>
                    <button id="skip-btn" disabled class="absolute right-0 bg-gray-800 hover:bg-gray-700 disabled:opacity-50 border border-gray-600 text-gray-400 px-4 py-2 rounded-full text-xs font-bold transition-all">Skip ➔</button>
                </div>
            </div>
        </div>

        <!-- ==================== MODULE 2: FREE CHAT MODE (TỰ DO) ==================== -->
        <div id="free-container" class="hidden h-full flex-col absolute inset-0 z-40 bg-gray-900">
            <header class="p-4 border-b border-gray-800 flex items-center">
                <button onclick="backToMenu()" class="p-2 -ml-2 text-gray-400 hover:text-white hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center" title="Quay lại">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <h1 class="text-xl font-bold text-purple-400 flex-1 text-center pr-6">Trò chuyện tự do</h1>
            </header>

            <div id="free-chat-box" class="flex-1 overflow-y-auto flex flex-col gap-6 p-4">
                <div class="self-center text-gray-500 text-xs bg-gray-800 px-3 py-1 rounded-full">
                    Hệ thống sẵn sàng. Bấm nút để bắt đầu nói.
                </div>
            </div>

            <div class="p-4 border-t border-gray-800 bg-gray-900">
                <div class="flex items-center justify-center">
                    <button id="free-record-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-full font-bold shadow-lg transition-all flex items-center gap-3 active:scale-95">
                        <div id="free-status-icon" class="w-3 h-3 bg-white rounded-full"></div>
                        <span id="free-btn-text">Start Recording</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
